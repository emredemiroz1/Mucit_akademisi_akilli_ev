<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mucit Akademisi | Akıllı Ev</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .btn-touch { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
    .btn-touch:active:not(:disabled) { transform: scale(0.96); }
    
    @keyframes pulse-border {
      0% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
      50% { border-color: rgba(239, 68, 68, 0.8); box-shadow: 0 0 10px 0 rgba(239, 68, 68, 0.4); }
      100% { border-color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .danger-pulse { animation: pulse-border 2s infinite; }
    .loader { width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.3); border-bottom-color: #fff; border-radius: 50%; display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAR1cyO7pFPM5RLvO308uAcSyf5HaqAizM",
      authDomain: "akillisera-b71d4.firebaseapp.com",
      projectId: "akillisera-b71d4",
      storageBucket: "akillisera-b71d4.firebasestorage.app",
      messagingSenderId: "326483167364",
      appId: "1:326483167364:web:77623670ecad58db099ad1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.FB = { auth, db, doc, onSnapshot, setDoc, signInAnonymously, onAuthStateChanged };
    window.APP_ID = "master-iot-final-v3";
    window.firebaseReady = true;
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function MetricCard({ title, value, unit, emoji, isDanger, isWarning }) {
      let colorClass = "border-white/5 bg-slate-800/50";
      if (isDanger) colorClass = "border-red-500/50 bg-red-500/10 text-red-400";
      else if (isWarning) colorClass = "border-amber-500/50 bg-amber-500/10 text-amber-400";
      else colorClass = "border-emerald-500/30 bg-emerald-500/10 text-emerald-400";

      return (
        <div className={`rounded-xl p-4 flex flex-col items-center justify-center border transition-colors ${colorClass}`}>
          <div className="text-4xl mb-2 drop-shadow-md">{emoji}</div>
          <div className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1 text-white">{title}</div>
          <div className="text-3xl font-black">{value}<span className="text-sm opacity-60 ml-1">{unit}</span></div>
        </div>
      );
    }

    function ModernWidget({ title, subtitle, icon, active, onClick, colorClass }) {
      return (
        <button onClick={onClick} className={`relative overflow-hidden p-5 rounded-[20px] border text-left btn-touch transition-all duration-300 ${active ? colorClass : 'bg-slate-800/50 border-white/5 text-slate-400'}`}>
          <div className="flex justify-between items-start mb-4">
             <div className={`text-4xl transition-transform duration-300 ${active ? 'scale-110 drop-shadow-[0_0_15px_currentColor]' : 'grayscale opacity-50'}`}>{icon}</div>
             <div className={`w-12 h-6 rounded-full p-1 transition-all ${active ? 'bg-white/30' : 'bg-slate-700'}`}>
                <div className={`w-4 h-4 bg-white rounded-full transition-all shadow-sm ${active ? 'translate-x-6' : 'translate-x-0'}`}></div>
             </div>
          </div>
          <div className={`font-black text-sm tracking-wide ${active ? 'text-white' : 'text-slate-300'}`}>{title}</div>
          <div className="text-[9px] uppercase tracking-widest opacity-70 mt-1 font-bold">{subtitle}</div>
        </button>
      );
    }

    function HomeVisualizer({ data }) {
      return (
        <div className="mb-10 w-full max-w-[700px] mx-auto animate-[fadeIn_0.5s_ease-out]">
          <div className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2 mb-3">
            <span>👁️</span> Dijital Ev İkizi
          </div>
          <div className="w-full aspect-[16/9] bg-slate-900/90 rounded-[32px] border-4 border-slate-800 p-4 shadow-[0_0_40px_rgba(0,0,0,0.4)] flex flex-col relative overflow-hidden">
             
             {/* Ev Çatısı ve Alarm */}
             <div className="w-0 h-0 border-l-[180px] border-r-[180px] border-b-[70px] border-l-transparent border-r-transparent border-b-slate-800 mx-auto relative mb-2 flex justify-center">
                <div className={`absolute top-[25px] flex flex-col items-center transition-all duration-500 ${data.alarm ? 'text-red-500 drop-shadow-[0_0_20px_#ef4444]' : 'text-slate-600 opacity-30'}`}>
                   <div className={`text-4xl ${data.alarm ? 'animate-pulse' : ''}`}>🚨</div>
                </div>
             </div>
             
             {/* Ev Gövdesi (Odalar) */}
             <div className="flex-1 bg-slate-800 rounded-xl flex border border-white/5 relative z-10 mb-12 shadow-2xl overflow-hidden">
                {/* Salon */}
                <div className={`flex-1 flex flex-col items-center justify-center relative border-r border-white/5 transition-colors duration-500 ${data.lightSalon ? 'bg-amber-500/15' : 'bg-slate-800/50'}`}>
                   <div className="absolute top-3 left-3 text-[10px] font-black text-white/40 uppercase tracking-widest">Salon</div>
                   <div className={`text-6xl transition-all duration-500 ${data.lightSalon ? 'drop-shadow-[0_0_30px_#fbbf24] scale-110' : 'opacity-30 grayscale'}`}>💡</div>
                   {/* Vantilatör */}
                   <div className={`absolute bottom-4 right-4 text-5xl transition-all duration-500 ${data.fan ? 'animate-spin text-cyan-400 drop-shadow-[0_0_15px_#22d3ee]' : 'opacity-30 grayscale'}`}>🌀</div>
                   {/* Müzik Sistemi Efekti */}
                   <div className={`absolute top-1/2 left-1/4 text-4xl transition-all duration-500 ${data.music ? 'animate-bounce text-purple-400 drop-shadow-[0_0_20px_#a855f7]' : 'opacity-0 scale-0'}`}>🎵</div>
                </div>
                {/* Mutfak */}
                <div className={`flex-1 flex flex-col items-center justify-center relative transition-colors duration-500 ${data.lightKitchen ? 'bg-amber-500/15' : 'bg-slate-800/50'}`}>
                   <div className="absolute top-3 right-3 text-[10px] font-black text-white/40 uppercase tracking-widest">Mutfak</div>
                   <div className={`text-6xl transition-all duration-500 ${data.lightKitchen ? 'drop-shadow-[0_0_30px_#fbbf24] scale-110' : 'opacity-30 grayscale'}`}>💡</div>
                </div>
             </div>

             {/* Bahçe ve Dış Mekan */}
             <div className="absolute bottom-0 left-0 w-full h-16 bg-emerald-900/30 border-t-4 border-emerald-800/50 flex items-end justify-between px-10 pb-2">
                
                {/* Bahçe Kapısı (Servo) */}
                <div className="flex flex-col items-center justify-end h-full relative w-20">
                   <div className={`absolute -top-8 text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded transition-colors ${data.gate ? 'text-emerald-400 bg-emerald-500/20' : 'text-red-400 bg-red-500/20'}`}>
                     {data.gate ? 'AÇIK' : 'KAPALI'}
                   </div>
                   {/* Servo Kapı Çubuğu */}
                   <div className={`absolute bottom-3 left-4 w-16 h-2.5 rounded transition-all duration-700 origin-left ${data.gate ? '-rotate-90 bg-emerald-500 shadow-[0_0_15px_#10b981]' : 'rotate-0 bg-red-500 shadow-[0_0_15px_#ef4444]'}`}>
                      <div className="w-full h-full" style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.3) 5px, rgba(255,255,255,0.3) 10px)'}}></div>
                   </div>
                   <div className="w-3 h-5 bg-slate-700 rounded-t z-10 border border-slate-600"></div>
                </div>

                {/* Bahçe Aydınlatması */}
                <div className="flex flex-col items-center justify-end h-full relative">
                   <div className={`absolute -top-10 text-5xl transition-all duration-500 ${data.lightGarden ? 'text-orange-400 drop-shadow-[0_0_30px_#f97316] scale-110' : 'text-slate-600 opacity-40'}`}>🌞</div>
                   <div className="w-2 h-12 bg-slate-600 rounded-t border-x border-slate-500"></div>
                </div>

             </div>
          </div>
        </div>
      );
    }

    function App() {
      const [ready, setReady] = useState(false);
      const [user, setUser] = useState(null);
      const [pin, setPin] = useState("");
      const [loggedIn, setLoggedIn] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");

      // ESP32'ye uyumlu tam donanım listesi ve gerçek sıcaklık verisi
      const [homeData, setHomeData] = useState({ 
        lightSalon: false, 
        lightKitchen: false, 
        lightGarden: false, 
        alarm: false, 
        alarmTriggered: false,
        gate: false, 
        fan: false,
        music: false,
        temp: 24.0
      });

      useEffect(() => {
        const t = setInterval(() => { if (window.firebaseReady && window.FB) { setReady(true); clearInterval(t); } }, 100);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        if (!ready) return;
        window.FB.signInAnonymously(window.FB.auth).catch(e => setErrorMsg("Bağlantı hatası!"));
        const unsub = window.FB.onAuthStateChanged(window.FB.auth, setUser);
        return () => unsub && unsub();
      }, [ready]);

      useEffect(() => {
        if (!user) return;
        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "home", "status");
        const unsubHome = window.FB.onSnapshot(ref, (snap) => { 
            if (snap.exists()) {
               const d = snap.data();
               const gv = (key) => d.fields ? (d.fields[key]?.booleanValue || false) : (d[key] || false);
               
               // Gerçek sıcaklık değerini Firebase'den çek
               let currentTemp = 24.0;
               if (d.fields && d.fields.temp) {
                 currentTemp = d.fields.temp.doubleValue !== undefined ? Number(d.fields.temp.doubleValue) : Number(d.fields.temp.integerValue || 24);
               } else if (d.temp !== undefined) {
                 currentTemp = Number(d.temp);
               }

               setHomeData({ 
                 lightSalon: gv("lightSalon"), 
                 lightKitchen: gv("lightKitchen"), 
                 lightGarden: gv("lightGarden"), 
                 alarm: gv("alarm"), 
                 alarmTriggered: gv("alarmTriggered"),
                 gate: gv("gate"), 
                 fan: gv("fan"),
                 music: gv("music"),
                 temp: currentTemp
               });
            } 
        });
        return () => unsubHome();
      }, [user]);

      const toggleHome = async (field) => {
        if (!user) return;
        
        let updates = { [field]: !homeData[field] };
        
        // GÜVENLİK SENARYOLARI
        if (field === "alarm" && !homeData.alarm) {
           updates.gate = false; // Alarm açılınca kapı açıksa kapat
        }

        if (field === "gate" && homeData.alarm && !homeData.gate) {
           setErrorMsg("🚨 GÜVENLİK: Çevre Güvenlik Radarı aktifken bahçe kapısı açılamaz!");
           setTimeout(() => setErrorMsg(""), 3500);
           return; 
        }

        const ref = window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "home", "status");
        await window.FB.setDoc(ref, updates, { merge: true }).catch(console.error);
      };

      function login() {
        if (pin === "0000") {
          setLoggedIn(true);
          setErrorMsg("");
        } else {
          setErrorMsg("Hatalı PIN! Akıllı Ev şifresi: 0000");
        }
      }

      if (!ready) return <div className="min-h-screen flex items-center justify-center px-6"><span className="loader"></span></div>;

      if (!loggedIn) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-50">
            <div className="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl relative overflow-hidden border border-slate-200">
              <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
              <div className="text-center mb-8 mt-4 flex flex-col items-center">
                <div className="mb-3 flex justify-center w-full"><img src="mucitlogo.png" alt="Logo" className="h-32 object-contain" /></div>
                <h1 className="text-center text-4xl font-black tracking-tighter text-slate-900 leading-[1.1]">MUCİT<br/><span className="text-blue-600">AKADEMİSİ</span></h1>
              </div>
              <input type="password" maxLength="4" value={pin} onChange={(e) => setPin(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && login()} placeholder="EV PIN KODU (0000)" className="w-full rounded-xl bg-slate-50 border border-slate-200 px-5 py-4 text-center text-xl tracking-[0.2em] text-slate-900 outline-none focus:border-blue-500 mb-4 font-bold" />
              <button onClick={login} className="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white py-4 font-bold uppercase tracking-wider btn-touch shadow-lg shadow-blue-600/20">Giriş Yap</button>
              {errorMsg && <div className="mt-4 p-3 rounded-lg bg-red-50 text-red-500 text-center text-sm font-medium">{errorMsg}</div>}
            </div>
          </div>
        );
      }

      // Çalışan cihaz sayısını hesapla (Sıcaklık ve alarmTriggered değerlerini dahil etme)
      const activeHomeDevices = Object.keys(homeData).filter(key => key !== 'temp' && key !== 'alarmTriggered' && homeData[key] === true).length;

      return (
        <div className="min-h-screen pb-12 relative">
          
          {/* HIRSIZ ALARMI TETİKLENDİĞİNDE ÇIKACAK TAM EKRAN UYARI */}
          {homeData.alarmTriggered && (
             <div className="fixed inset-0 z-[100] bg-red-600/95 backdrop-blur-md flex flex-col items-center justify-center p-6 text-center animate-pulse">
                <div className="text-9xl mb-6 drop-shadow-[0_0_40px_rgba(255,255,255,0.8)]">🚨</div>
                <h1 className="text-5xl md:text-7xl font-black text-white mb-4 uppercase tracking-widest drop-shadow-lg">DİKKAT!</h1>
                <h2 className="text-2xl md:text-4xl font-bold text-white mb-8">Hırsız Alarmı Tetiklendi</h2>
                <p className="text-lg md:text-xl text-white/90 mb-12 font-medium">Çevre güvenlik radarı izinsiz giriş tespit etti! Donanım 10 saniye boyunca siren çalacaktır.</p>
                <button 
                   onClick={() => window.FB.setDoc(window.FB.doc(window.FB.db, "artifacts", window.APP_ID, "public", "data", "home", "status"), { alarmTriggered: false, alarm: false }, { merge: true }).catch(console.error)}
                   className="px-8 py-5 bg-white text-red-600 rounded-2xl font-black text-xl md:text-2xl uppercase tracking-widest shadow-2xl hover:bg-red-50 transition-colors btn-touch"
                >
                  Sustur ve Kapat
                </button>
             </div>
          )}

          <header className="px-6 py-5 glass-panel sticky top-0 z-50 flex items-center justify-between shadow-lg">
            <div className="flex items-center gap-4">
              <div className="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-2xl shadow-lg">🏠</div>
              <div>
                <div className="text-xl font-black tracking-tight text-white">AKILLI EV</div>
                <div className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500"></span> MUCİT AKADEMİSİ</div>
              </div>
            </div>
            <button onClick={() => { setLoggedIn(false); setPin(""); }} className="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-sm font-bold btn-touch hover:bg-white/10">ÇIKIŞ</button>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-8 animate-[fadeIn_0.3s_ease-out]">
            
            {errorMsg && (
              <div className="max-w-md mx-auto mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/30 text-red-400 text-center text-sm font-bold shadow-lg animate-[fadeIn_0.2s_ease-out]">
                {errorMsg}
              </div>
            )}

            <HomeVisualizer data={homeData} />

            {/* Simetrik İkili Bilgi Kartları */}
            <div className="grid grid-cols-2 gap-4 mb-8">
              <MetricCard 
                title="Evin Sıcaklığı" 
                value={homeData.temp} 
                unit="°C" 
                emoji="🌡️" 
                isDanger={homeData.temp > 28} 
                isWarning={homeData.temp < 18} 
              />
              <MetricCard 
                title="Çalışan Cihaz" 
                value={activeHomeDevices} 
                unit="/ 7" 
                emoji="🔌" 
                isDanger={activeHomeDevices >= 6} 
                isWarning={activeHomeDevices >= 4} 
              />
            </div>

            <div className="glass-panel p-6 rounded-[24px] border border-white/10 shadow-xl">
              <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                <span>📱</span> Ev Aletleri & Güvenlik Kontrol Merkezi
              </h3>
              
              <div className="grid grid-cols-2 md:grid-cols-3 gap-5">
                <ModernWidget title="Salon Işığı" subtitle="İç Aydınlatma 1" icon="💡" active={homeData.lightSalon} onClick={() => toggleHome("lightSalon")} colorClass="bg-amber-500/20 border-amber-500/50 text-amber-200" />
                <ModernWidget title="Mutfak Işığı" subtitle="İç Aydınlatma 2" icon="💡" active={homeData.lightKitchen} onClick={() => toggleHome("lightKitchen")} colorClass="bg-yellow-500/20 border-yellow-500/50 text-yellow-200" />
                <ModernWidget title="Bahçe Işığı" subtitle="Dış Aydınlatma" icon="🌞" active={homeData.lightGarden} onClick={() => toggleHome("lightGarden")} colorClass="bg-orange-500/20 border-orange-500/50 text-orange-200" />
                
                <ModernWidget title="Hırsız Alarmı" subtitle="HC-SR04 Sensör" icon="🚨" active={homeData.alarm} onClick={() => toggleHome("alarm")} colorClass="bg-red-500/20 border-red-500/50 text-red-200" />
                <ModernWidget title="Bahçe Kapısı" subtitle="Servo Motor" icon="🚧" active={homeData.gate} onClick={() => toggleHome("gate")} colorClass="bg-emerald-500/20 border-emerald-500/50 text-emerald-200" />
                <ModernWidget title="Vantilatör" subtitle="DC Motor / Fan" icon="🌀" active={homeData.fan} onClick={() => toggleHome("fan")} colorClass="bg-cyan-500/20 border-cyan-500/50 text-cyan-200" />
                <ModernWidget title="Müzik Çalar" subtitle="Akıllı Hoparlör" icon="🎵" active={homeData.music} onClick={() => toggleHome("music")} colorClass="bg-purple-500/20 border-purple-500/50 text-purple-200" />
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body> 
</html>
